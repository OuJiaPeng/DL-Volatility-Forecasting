# Real SPX data run (Databento). Pull first: python scripts/pull_spx_history.py
vendor: databento
start: "2021-01-04"    # extended 2026-07: 2021->2024-05 pulled at 5-min window (~$0.07/day)
end:   "2026-07-02"
seed:  7

databento:
  es_symbol: "ES.c.0"
  close_window_minutes: 5   # 2024-06+ days were cached at 15-min; last-snapshot logic makes them equivalent
  option_roots: ["SPX.OPT", "SPXW.OPT"]

# panel / calendar
open_time:  "09:30"
close_time: "16:00"
rv_minutes: 5
horizons: [1, 5, 10, 21]

# split (time-ordered + purge/embargo)
train_frac: 0.6
val_frac:   0.2
embargo:    5

# v2 hybrid model
model:
  lookback: 30
  emb_dim: 32
  n_heads: 4
  n_layers: 2
  dropout: 0.1
  quantiles: [0.1, 0.5, 0.9]
  lr: 0.001
  epochs: 60
  patience: 10
  batch_size: 64
  lambda_qlike: 0.1
  n_runs: 3
  seed: 7
  device: cpu
